<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>İyi ki doğdun!</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body {
      background: #0a0a0a;
      margin: 0;
      padding: 40px 20px;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
      color: #fff;
      font-size: 2em;
      margin-bottom: 10px;
    }
    .niceSenelere {
      text-align: center;
      color: #fff;
      font-size: 2em;
      font-weight: bold;
      letter-spacing: 4px;
      margin-bottom: 40px;
    }
    .galeri {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .galeri img {
      width: 300px;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <h1>🎉 İyi ki doğdun! 🎉</h1>
  <p class="niceSenelere">🎂 Nice Senelere! 🎂</p>
  <div class="galeri">
    <img src="logo.jpeg">
    <img src="logo2.jpeg">
    <img src="logo3.jpeg">
    <img src="logo4.jpeg">
    <img src="logo5.jpeg">
  </div>
  <script>
    confetti({ particleCount: 200, spread: 160, origin: { y: 0.4 } });
    setTimeout(() => confetti({ particleCount: 150, angle: 60, spread: 80, origin: { x: 0 } }), 600);
    setTimeout(() => confetti({ particleCount: 150, angle: 120, spread: 80, origin: { x: 1 } }), 1200);
    setTimeout(() => confetti({ particleCount: 200, spread: 160, origin: { y: 0.4 } }), 2000);
  </script>
</body>
</html>
