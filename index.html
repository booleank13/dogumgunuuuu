<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>İyi ki doğdun!</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    iframe {
      width: 80%;
      height: 80vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe src="logo.pdf"></iframe>
  <script>
    confetti({ particleCount: 200, spread: 160, origin: { y: 0.6 } });
    setTimeout(() => confetti({ particleCount: 150, angle: 60, spread: 80, origin: { x: 0 } }), 500);
    setTimeout(() => confetti({ particleCount: 150, angle: 120, spread: 80, origin: { x: 1 } }), 1000);
    setTimeout(() => confetti({ particleCount: 200, spread: 160, origin: { y: 0.6 } }), 2000);
  </script>
</body>
</html>
